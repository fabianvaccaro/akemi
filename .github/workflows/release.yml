name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check versions and extract release notes
        run: python3 .github/scripts/release_notes.py "${GITHUB_REF_NAME#v}" > release_notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Akemi ${GITHUB_REF_NAME#v}" \
            --notes-file release_notes.md \
            --verify-tag
